<!DOCTYPE html>
<html>
<head>

<title>Personagem</title>

<style>

body{
  margin:0;
  font-family: Georgia, serif;
  color:#2c1a0f;

  background-image: url("https://i.imgur.com/A6uOdFA.png");
  background-size: cover;
  background-position: left center;
  background-repeat: no-repeat;

  height:100vh;
  display:flex;
  justify-content:flex-end;
  align-items:center;
}

.card{

  background:rgba(245,222,179,0.92);

  padding:45px;

  width:420px;

  margin-right:5%;

  border-radius:14px;

  border:5px solid #5a3b1a;

  box-shadow:0 0 40px rgba(0,0,0,0.7);

}

h1{
  margin-top:0;
  font-size:34px;
}

.stat{
  margin:10px 0;
  font-size:20px;
}

.inventory{
  margin-top:25px;
}

li{
  margin:6px 0;
  font-size:18px;
}

</style>

</head>

<body>

<div class="card">

<h1 id="nome"></h1>

<div class="stat" id="classe"></div>
<div class="stat" id="nivel"></div>
<div class="stat" id="gp"></div>

<div class="inventory">
<h3>Inventário</h3>
<ul id="inventario"></ul>
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const user = params.get("user");

const personagens = {

sirion:{
nome:"Sírion",
classe:"Bardo",
nivel:5,
gp:120,
inventario:[
"Alaúde",
"Lira",
"Anel de Zarabak"
]
}

};

const p = personagens[user];

if(p){

document.getElementById("nome").innerText = p.nome;
document.getElementById("classe").innerText = "Classe: " + p.classe;
document.getElementById("nivel").innerText = "Nível: " + p.nivel;
document.getElementById("gp").innerText = "Ouro: " + p.gp + " GP";

const lista = document.getElementById("inventario");

p.inventario.forEach(item=>{
const li = document.createElement("li");
li.innerText = item;
lista.appendChild(li);
});

}

else{
document.getElementById("nome").innerText="Personagem não encontrado";
}

</script>

</body>
</html>
