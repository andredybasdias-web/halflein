<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Georgia, serif;
background:#1a1a1a;
}

.hero{
width:100%;
height:45vh;
background-image:url("https://i.imgur.com/xRvt1e9.png");
background-size:cover;
background-position:center top;
}

.card{
background:#f3e2c2;
margin:-30px 15px 20px 15px;
padding:20px;
border-radius:10px;
border:3px solid #5a3b1a;
}

.item{
padding:10px;
margin:5px 0;
background:#e8d2a9;
border-radius:5px;
display:flex;
justify-content:space-between;
}

button{
margin-left:5px;
}

</style>

</head>

<body>

<div class="hero"></div>

<div class="card">

<h2>Ghor Lightwood</h2>

<div id="inventario"></div>

<br>

<button onclick="addItem()">➕ Adicionar item</button>

</div>

<script>

const supabase = window.supabase.createClient(
"https://fuocztjyfygvjemjwfkx.supabase.co",
"sb_publishable_n7ngCkGvC6jdFTdKCpm5Xg_MIaim-Np"
)

async function carregarItens(){

const {data} = await supabase
.from("itens")
.select("*")
.eq("personagem_id",1)

const div = document.getElementById("inventario")

div.innerHTML=""

data.forEach(item=>{

div.innerHTML += `

<div class="item">

${item.nome}

<div>

<button onclick="editarItem(${item.id},'${item.nome}')">🪶</button>

<button onclick="deletarItem(${item.id})">🗑</button>

</div>

</div>

`

})

}

async function addItem(){

const nome = prompt("Nome do item")

if(!nome) return

await supabase.from("itens").insert({

personagem_id:1,
nome:nome,
descricao:""

})

carregarItens()

}

async function editarItem(id,nomeAtual){

const novoNome = prompt("Editar item",nomeAtual)

if(!novoNome) return

await supabase
.from("itens")
.update({nome:novoNome})
.eq("id",id)

carregarItens()

}

async function deletarItem(id){

if(!confirm("Deletar item?")) return

await supabase
.from("itens")
.delete()
.eq("id",id)

carregarItens()

}

carregarItens()

</script>

</body>

</html>
