<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Georgia, serif;
background:#1a1a1a;
color:#2c1a0f;
}

.hero{
width:100%;
height:45vh;
background-size:cover;
background-position:center 40%;
}

.card{
background:#f3e2c2;
margin:-30px 15px 20px 15px;
padding:20px;
border-radius:10px;
border:3px solid #5a3b1a;
}

.stats{
margin-top:10px;
margin-bottom:10px;
}

.gold{
font-size:18px;
margin-bottom:15px;
display:flex;
align-items:center;
gap:8px;
}

.item{
padding:12px;
margin:6px 0;
background:#e8d2a9;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
cursor:pointer;
margin-left:6px;
}

.popup{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.popupCard{
background:#f3e2c2;
padding:25px;
border-radius:10px;
border:4px solid #5a3b1a;
width:300px;
max-width:90%;
}

textarea,input{
width:100%;
font-family:Georgia, serif;
}

.popupButtons{
margin-top:10px;
display:flex;
justify-content:space-between;
}

#hero, #card{
transition: opacity 0.4s ease;
}

</style>

</head>

<body>

<!-- OVERLAY MODO BATALHA -->
<div id="battleOverlay" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
">

<img id="battleGif" style="
width:80%;
max-width:400px;
">

<div id="battleCard" style="
background:#f3e2c2;
padding:20px;
border-radius:10px;
margin-top:20px;
display:none;
text-align:center;
">

<p>Digite sua iniciativa</p>

<input 
id="initiativeInput" 
type="number" 
inputmode="numeric" 
pattern="[0-9]*" 
style="width:80px;">

<br><br>

<button onclick="enviarIniciativa()">Enviar</button>

</div>

</div>

<!-- ÍCONE DE BATALHA -->
<img id="battleIcon" style="
position:fixed;
top:10px;
right:10px;
width:50px;
display:none;
z-index:999;
">

<div class="hero" id="hero"></div>

<div class="card" id="card">

<h2 id="nomePersonagem">...</h2>

<div class="stats" id="stats"></div>

<div class="gold">
🪙 <span id="ouro"></span>
<button onclick="editarOuro()">🪶</button>
</div>

<div id="inventario"></div>

<br>

<button onclick="novoItem()">➕ Novo item</button>

</div> <!-- FECHA A CARD -->

<!-- SEÇÃO TOQUE DA LUA -->
<div id="toqueSection" style="
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
background:#1a1a1a;
opacity:0;
transition: opacity 1.2s ease-out;
">

<h2 id="toqueNome" style="margin-bottom:20px;"></h2>

<img id="toqueImagem" style="display:none;">

</div>

<div id="popup" class="popup">

<div class="popupCard">

<h3 id="popupNome"></h3>

<textarea id="popupDescricao"></textarea>

<div class="popupButtons">

<button onclick="salvarDescricao()">🪶 Salvar</button>

<button onclick="fecharPopup()">Fechar</button>

</div>

</div>

</div>

<script>

const { createClient } = supabase

const client = createClient(
"https://fuocztjyfygvjemjwfkx.supabase.co",
"sb_publishable_n7ngCkGvC6jdFTdKCpm5Xg_MIaim-Np"
)

const BATTLE_GIF = "https://i.ibb.co/HDVkgX81/GIF-M-DIA-QUALIDADE-1.gif"
const BATTLE_ICON = "https://i.ibb.co/R4sLNZXd/Modo-de-Batalha.png"

const params = new URLSearchParams(window.location.search)

const token = params.get("token")

// esconder token da barra do navegador
if(token){
window.history.replaceState({}, document.title, "char.html")
}

const master = params.get("master") === "true"

let personagem_id = null
let itemAtual = null

async function carregarToque(nome){

if(!nome) return

const { data } = await client
.from("toques")
.select("*")
.eq("nome", nome)
.single()

if(data){
document.getElementById("toqueNome").innerText = data.nome

const img = document.getElementById("toqueImagem")

img.src = data.imagem
img.style.display = "block"

// tamanho controlado pelo banco
img.style.width = data.escala || "90%"
img.style.maxWidth = "none"
}

}

async function getPersonagem(){

const { data } = await client
.from("personagens")
.select("*")
.eq("token", token)
.single()

personagem_id = data.id

document.getElementById("nomePersonagem").innerText = data.nome

document.querySelector(".hero").style.backgroundImage = `url(${data.imagem})`

document.querySelector(".hero").style.backgroundPosition = `center ${data.imagem_posicao || "40%"}`

document.getElementById("ouro").innerText = data.ouro

let statsHTML = `
Raça: ${data.raca}<br>
Classe: ${data.classe}<br>
Nível: ${data.nivel}
`

if(master){

statsHTML += `<br><button onclick="editarStats()">🪶 Editar atributos</button>`

}

document.getElementById("stats").innerHTML = statsHTML

carregarItens()

carregarToque(data.toque_nome)

}

async function carregarItens(){

const { data } = await client
.from("itens")
.select("*")
.eq("personagem_id", personagem_id)

const div = document.getElementById("inventario")

div.innerHTML = ""

data.forEach(item => {

const el = document.createElement("div")
el.className = "item"

el.innerHTML = `
<span>${item.nome}</span>
<div>
<button onclick="abrirItem(${item.id},'${item.nome}','${item.descricao || ""}')">📜</button>
<button onclick="deletarItem(${item.id})">🗑</button>
</div>
`

div.appendChild(el)

})

}

function abrirItem(id,nome,descricao){

itemAtual = id

document.getElementById("popupNome").innerText = nome

document.getElementById("popupDescricao").value = descricao || ""

document.getElementById("popup").style.display = "flex"

}

function fecharPopup(){

document.getElementById("popup").style.display = "none"

}

async function salvarDescricao(){

const desc = document.getElementById("popupDescricao").value

await client
.from("itens")
.update({descricao:desc})
.eq("id",itemAtual)

fecharPopup()

carregarItens()

}

async function novoItem(){

const nome = prompt("Nome do item")

if(!nome) return

await client
.from("itens")
.insert({
personagem_id: personagem_id,
nome: nome,
descricao: ""
})

carregarItens()

}

async function deletarItem(id){

if(!confirm("Deletar item?")) return

await client
.from("itens")
.delete()
.eq("id", id)

carregarItens()

}

async function editarOuro(){

const novo = prompt("Novo valor de ouro")

if(!novo) return

await client
.from("personagens")
.update({ouro:novo})
.eq("id",personagem_id)

getPersonagem()

}

function iniciarBatalha(){

const overlay = document.getElementById("battleOverlay")
const gif = document.getElementById("battleGif")
const card = document.getElementById("battleCard")

overlay.style.display = "flex"
gif.src = BATTLE_GIF

card.style.display = "none"

setTimeout(() => {
card.style.display = "block"
}, 1500)

}

async function enviarIniciativa(){

const valor = document.getElementById("initiativeInput").value

if(!valor) return

await client.from("iniciativas").insert({
personagem_id: personagem_id,
valor: parseInt(valor)
})

document.getElementById("battleOverlay").style.display = "none"

const icon = document.getElementById("battleIcon")
icon.src = BATTLE_ICON
icon.style.display = "block"

}

async function editarStats(){

const raca = prompt("Raça")
const classe = prompt("Classe")
const nivel = prompt("Nível")

await client
.from("personagens")
.update({
raca:raca,
classe:classe,
nivel:nivel
})
.eq("id",personagem_id)

getPersonagem()

}

getPersonagem()

client
.channel('batalha-channel')
.on(
'postgres_changes',
{
event: 'UPDATE',
schema: 'public',
table: 'batalha'
},
(payload) => {

if(payload.new.ativa === true){
iniciarBatalha()
}else{
document.getElementById("battleOverlay").style.display = "none"
document.getElementById("battleIcon").style.display = "none"
}

}
)
.subscribe()

window.addEventListener("scroll", () => {

const toque = document.getElementById("toqueSection")
const hero = document.getElementById("hero")
const card = document.getElementById("card")

const rect = toque.getBoundingClientRect()

// quando o toque entra na tela
if(rect.top < window.innerHeight * 0.7){

// some topo
hero.style.opacity = "0"
card.style.opacity = "0"
hero.style.pointerEvents = "none"
card.style.pointerEvents = "none"

// mostra toque
toque.style.opacity = "1"

}else{

// mostra topo
hero.style.opacity = "1"
card.style.opacity = "1"
hero.style.pointerEvents = "auto"
card.style.pointerEvents = "auto"

// esconde toque
toque.style.opacity = "0"

}

})

</script>

</body>

</html>
