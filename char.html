<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Georgia, serif;
background:#1a1a1a;
color:#2c1a0f;
}

.hero{
width:100%;
height:45vh;
background-image:url("https://i.imgur.com/xRvt1e9.png");
background-size:cover;
background-position:center top;
}

.card{
background:#f3e2c2;
margin:-30px 15px 20px 15px;
padding:20px;
border-radius:10px;
border:3px solid #5a3b1a;
}

.stats{
margin-top:10px;
margin-bottom:10px;
}

.gold{
font-size:18px;
margin-bottom:15px;
display:flex;
align-items:center;
gap:8px;
}

.item{
padding:12px;
margin:6px 0;
background:#e8d2a9;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
cursor:pointer;
margin-left:6px;
}

.popup{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.popupCard{
background:#f3e2c2;
padding:25px;
border-radius:10px;
border:4px solid #5a3b1a;
width:300px;
max-width:90%;
}

textarea,input{
width:100%;
font-family:Georgia, serif;
}

.popupButtons{
margin-top:10px;
display:flex;
justify-content:space-between;
}

</style>

</head>

<body>

<div class="hero"></div>

<div class="card">

<h2 id="nomePersonagem">...</h2>

<div class="stats" id="stats"></div>

<div class="gold">
🪙 <span id="ouro"></span>
<button onclick="editarOuro()">🪶</button>
</div>

<div id="inventario"></div>

<br>

<button onclick="novoItem()">➕ Novo item</button>

</div>

<div id="popup" class="popup">

<div class="popupCard">

<h3 id="popupNome"></h3>

<textarea id="popupDescricao"></textarea>

<div class="popupButtons">

<button onclick="salvarDescricao()">🪶 Salvar</button>

<button onclick="fecharPopup()">Fechar</button>

</div>

</div>

</div>

<script>

const { createClient } = supabase

const client = createClient(
"https://fuocztjyfygvjemjwfkx.supabase.co",
"sb_publishable_n7ngCkGvC6jdFTdKCpm5Xg_MIaim-Np"
)

const params = new URLSearchParams(window.location.search)

const token = params.get("token")

const master = params.get("master") === "true"

let personagem_id = null
let itemAtual = null

async function getPersonagem(){

const { data } = await client
.from("personagens")
.select("*")
.eq("token", token)
.single()

personagem_id = data.id

document.getElementById("nomePersonagem").innerText = data.nome

document.querySelector(".hero").style.backgroundImage = `url(${data.imagem})`

document.getElementById("ouro").innerText = data.ouro

let statsHTML = `
Raça: ${data.raca}<br>
Classe: ${data.classe}<br>
Nível: ${data.nivel}
`

if(master){

statsHTML += `<br><button onclick="editarStats()">🪶 Editar atributos</button>`

}

document.getElementById("stats").innerHTML = statsHTML

carregarItens()

}

async function carregarItens(){

const { data } = await client
.from("itens")
.select("*")
.eq("personagem_id", personagem_id)

const div = document.getElementById("inventario")

div.innerHTML = ""

data.forEach(item => {

const el = document.createElement("div")
el.className = "item"

el.innerHTML = `
<span>${item.nome}</span>
<div>
<button onclick="abrirItem(${item.id},'${item.nome}','${item.descricao || ""}')">📜</button>
<button onclick="deletarItem(${item.id})">🗑</button>
</div>
`

div.appendChild(el)

})

}

function abrirItem(id,nome,descricao){

itemAtual = id

document.getElementById("popupNome").innerText = nome

document.getElementById("popupDescricao").value = descricao || ""

document.getElementById("popup").style.display = "flex"

}

function fecharPopup(){

document.getElementById("popup").style.display = "none"

}

async function salvarDescricao(){

const desc = document.getElementById("popupDescricao").value

await client
.from("itens")
.update({descricao:desc})
.eq("id",itemAtual)

fecharPopup()

carregarItens()

}

async function novoItem(){

const nome = prompt("Nome do item")

if(!nome) return

await client
.from("itens")
.insert({
personagem_id: personagem_id,
nome: nome,
descricao: ""
})

carregarItens()

}

async function deletarItem(id){

if(!confirm("Deletar item?")) return

await client
.from("itens")
.delete()
.eq("id", id)

carregarItens()

}

async function editarOuro(){

const novo = prompt("Novo valor de ouro")

if(!novo) return

await client
.from("personagens")
.update({ouro:novo})
.eq("id",personagem_id)

getPersonagem()

}

async function editarStats(){

const raca = prompt("Raça")

const classe = prompt("Classe")

const nivel = prompt("Nível")

await client
.from("personagens")
.update({
raca:raca,
classe:classe,
nivel:nivel
})
.eq("id",personagem_id)

getPersonagem()

}

getPersonagem()

</script>

</body>

</html>
