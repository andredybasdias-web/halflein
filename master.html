<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Georgia, serif;
background-image:url("https://i.imgur.com/DG7KMZ9.png");
background-size:cover;
background-position:center;
color:white;
}

.overlay{
background:rgba(0,0,0,0.55);
min-height:100vh;
padding:40px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
max-width:900px;
margin:auto;
}

.card{
background:rgba(0,0,0,0.6);
border:2px solid #d4af37;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
object-position:center;
}

.info{
padding:10px;
text-align:center;
}

.name{
font-size:20px;
margin-bottom:5px;
}

.meta{
font-size:14px;
opacity:0.9;
}

</style>

</head>

<body>

<div class="overlay">

<h1>Painel do Mestre</h1>

<div class="grid" id="personagens"></div>

<!-- BOTÃO -->
<div style="text-align:center; margin-top:30px;">
<img id="battleBtn" onclick="toggleBatalha()" src="https://i.ibb.co/zhPMbkFm/f99d2df7-cef3-4a1b-a1a0-0965dad42218.png" style="width:120px; cursor:pointer;">
</div>

<!-- LISTA -->
<div id="initiativeList" style="
display:none;
max-width:400px;
margin:20px auto;
background:rgba(0,0,0,0.7);
padding:20px;
border-radius:10px;
color:white;
">
</div>

</div>

<script>

// 🔐 PROTEÇÃO
const params = new URLSearchParams(window.location.search)
const key = params.get("key")
const MASTER_KEY = "9f3c81d2a7"

if(key !== MASTER_KEY){
document.body.innerHTML = "Acesso restrito."
throw new Error("Acesso negado")
}

window.history.replaceState({}, document.title, "master.html")

const { createClient } = supabase

const client = createClient(
"https://fuocztjyfygvjemjwfkx.supabase.co",
"sb_publishable_n7ngCkGvC6jdFTdKCpm5Xg_MIaim-Np"
)

// 🎨 IMAGENS
const BTN_OFF = "https://i.ibb.co/zhPMbkFm/f99d2df7-cef3-4a1b-a1a0-0965dad42218.png"
const BTN_ON = "https://i.ibb.co/R4sLNZXd/Modo-de-Batalha.png"

// ⚔️ TOGGLE
async function toggleBatalha(){

const { data, error } = await client
.from("batalha")
.select("*")
.eq("id",1)
.single()

if(error || !data){
alert("Erro ao acessar batalha")
return
}

const novoEstado = !data.ativa

await client
.from("batalha")
.update({ativa: novoEstado})
.eq("id",1)

const btn = document.getElementById("battleBtn")
const lista = document.getElementById("initiativeList")

if(novoEstado){

btn.src = BTN_ON
lista.style.display = "block"
carregarIniciativas()

}else{

btn.src = BTN_OFF
lista.style.display = "none"

await client.from("iniciativas").delete().neq("id",0)

}

}

// 👥 PERSONAGENS
async function carregarPersonagens(){

const { data } = await client
.from("personagens")
.select("*")

const grid = document.getElementById("personagens")
grid.innerHTML = ""

data.forEach(p => {

const el = document.createElement("div")
el.className = "card"

el.onclick = () => {
window.location.href = `char.html?token=${p.token}&master=true`
}

el.innerHTML = `
<img src="${p.imagem}" style="object-position:center ${p.imagem_posicao || "40%"}">
<div class="info">
<div class="name">${p.nome}</div>
<div class="meta">${p.raca} • ${p.classe} • Nível ${p.nivel}</div>
</div>
`

grid.appendChild(el)

})

}

// 📊 INICIATIVAS
async function carregarIniciativas(){

const { data } = await client
.from("iniciativas")
.select("*")
.order("valor", { ascending: false })
.order("timestamp", { ascending: true })

const lista = document.getElementById("initiativeList")

if(!data || data.length === 0){
lista.innerHTML = "<p style='text-align:center;'>Aguardando iniciativas...</p>"
return
}

// 🔥 buscar nomes manualmente
const ids = data.map(i => i.personagem_id)

const { data: personagens } = await client
.from("personagens")
.select("id, nome")
.in("id", ids)

lista.innerHTML = ""

data.forEach((item, i) => {

const personagem = personagens.find(p => p.id === item.personagem_id)

lista.innerHTML += `
<div style="
display:flex;
justify-content:space-between;
margin-bottom:8px;
${i === 0 ? "color: gold; font-weight:bold;" : ""}
">
<span>${personagem ? personagem.nome : "???"}</span>
<span>${item.valor}</span>
</div>
`

})

}

// 🚀 INIT
window.onload = async () => {

carregarPersonagens()

const { data } = await client
.from("batalha")
.select("*")
.eq("id",1)
.single()

const btn = document.getElementById("battleBtn")
btn.src = data?.ativa ? BTN_ON : BTN_OFF

}

// 🔄 REALTIME
client
.channel('iniciativas-channel')
.on(
'postgres_changes',
{
event: '*',
schema: 'public',
table: 'iniciativas'
},
() => {
carregarIniciativas()
}
)
.subscribe()

</script>

</body>

</html>
